<form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>

  <app-input
    name="correo"
    text="Correo electrónico"
    type="email"
    placeholder="correo@ejemplo.com"
    [control]="correo"
  />
  <span *ngIf="correo.invalid && correo.touched">Ingresa un correo válido.</span>

  <app-input
    name="contrasena"
    text="Contraseña"
    [type]="showPassword ? 'text' : 'password'"
    placeholder="Tu contraseña"
    [control]="contrasena"
  />
  <button type="button" (click)="togglePassword()">
    {{ showPassword ? 'Ocultar' : 'Mostrar' }}
  </button>
  <span *ngIf="contrasena.invalid && contrasena.touched">Mínimo 8 caracteres.</span>

  <a routerLink="/auth/forgot-password">¿Olvidaste tu contraseña?</a>

  <p *ngIf="errorMessage">{{ errorMessage }}</p>

  <button type="submit">Iniciar sesión</button>

  <p>¿No tienes cuenta? <a routerLink="/auth/register">Regístrate gratis</a></p>

</form>
