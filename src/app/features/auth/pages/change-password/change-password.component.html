<form [formGroup]="formulario" (ngSubmit)="onSubmit()" novalidate>

  <app-input
    name="contrasenaActual"
    text="Contraseña actual"
    [type]="mostrarActual ? 'text' : 'password'"
    placeholder="Tu contraseña actual"
    [control]="contrasenaActual"
  />
  <button type="button" (click)="toggleActual()">
    {{ mostrarActual ? 'Ocultar' : 'Mostrar' }}
  </button>
  <span *ngIf="contrasenaActual.invalid && contrasenaActual.touched">
    Este campo es obligatorio.
  </span>

  <app-input
    name="nuevaContrasena"
    text="Nueva contraseña"
    [type]="mostrarNueva ? 'text' : 'password'"
    placeholder="Tu nueva contraseña"
    [control]="nuevaContrasena"
  />
  <button type="button" (click)="toggleNueva()">
    {{ mostrarNueva ? 'Ocultar' : 'Mostrar' }}
  </button>
  <div *ngIf="nuevaContrasena.invalid && nuevaContrasena.touched">
    <span *ngIf="nuevaContrasena.hasError('required')">La contraseña es obligatoria.</span>
    <span *ngIf="nuevaContrasena.hasError('minlength')">Mínimo 8 caracteres.</span>
    <span *ngIf="nuevaContrasena.hasError('pattern')">Debe incluir mayúscula, minúscula, número y carácter especial.</span>
  </div>

  <app-input
    name="confirmarContrasena"
    text="Confirmar nueva contraseña"
    [type]="mostrarNueva ? 'text' : 'password'"
    placeholder="Repite tu nueva contraseña"
    [control]="confirmarContrasena"
  />
  <div *ngIf="confirmarContrasena.touched">
    <span *ngIf="confirmarContrasena.hasError('required')">Debe confirmar la contraseña.</span>
    <span *ngIf="confirmarContrasena.hasError('passwordMismatch')">Las contraseñas no coinciden.</span>
  </div>

  <p *ngIf="mensajeExito">{{ mensajeExito }}</p>
  <p *ngIf="mensajeError">{{ mensajeError }}</p>

  <button type="submit">Cambiar contraseña</button>

</form>
