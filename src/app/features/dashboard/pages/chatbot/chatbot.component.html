<!-- Floating dumbbell button -->
<button
  class="chat-fab"
  type="button"
  (click)="toggle()"
  [class.is-open]="isOpen"
  [attr.aria-expanded]="isOpen"
  aria-label="Abrir soporte Voltic"
>
  <!-- Dumbbell icon (closed state) -->
  <svg *ngIf="!isOpen" class="fab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="2" y="10" width="3" height="4" rx="1"/>
    <rect x="7" y="7" width="3" height="10" rx="1"/>
    <line x1="10" y1="12" x2="14" y2="12"/>
    <rect x="14" y="7" width="3" height="10" rx="1"/>
    <rect x="19" y="10" width="3" height="4" rx="1"/>
  </svg>
  <!-- Close X (open state) -->
  <svg *ngIf="isOpen" class="fab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <line x1="18" y1="6" x2="6" y2="18"/>
    <line x1="6" y1="6" x2="18" y2="18"/>
  </svg>
  <span class="chat-fab__pulse" *ngIf="!isOpen"></span>
</button>

<!-- Chat panel -->
<aside class="chat-panel" [class.is-visible]="isOpen" aria-label="Soporte VolticFit">

  <!-- Header -->
  <div class="chat-header">
    <div class="chat-header__info">
      <span class="chat-header__dot"></span>
      <div>
        <strong>Soporte Voltic</strong>
        <small>{{ isAdmin ? 'Chatbot administrativo' : 'Chatbot o instructor' }}</small>
      </div>
    </div>
  </div>

  <!-- Mode tabs -->
  <div class="chat-tabs">
    <button type="button" [class.is-active]="mode === 'chatbot'" (click)="selectMode('chatbot')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      Bot
    </button>
    <button type="button" *ngIf="!isAdmin" [class.is-active]="mode === 'instructor'" (click)="selectMode('instructor')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Instructor
    </button>
  </div>

  <!-- Chat body -->
  <ng-container *ngIf="mode === 'chatbot'; else instructorPanel">
    <div class="chat-messages" #messageList>
      <article
        class="chat-msg"
        *ngFor="let message of messages"
        [class.chat-msg--user]="message.role === 'user'"
        [class.chat-msg--system]="message.role === 'system'">
        <p>{{ message.text }}</p>
      </article>

      <article class="chat-msg chat-msg--typing" *ngIf="loading">
        <span></span><span></span><span></span>
      </article>

      <p class="chat-error" *ngIf="error">{{ error }}</p>
      <button class="chat-link" type="button" *ngIf="error && !isAdmin" (click)="selectMode('instructor')">
        Contactar instructor
      </button>
    </div>

    <form [formGroup]="chatForm" (ngSubmit)="send()" class="chat-form">
      <input type="text" formControlName="message" placeholder="Escribe tu mensaje..." autocomplete="off" />
      <button type="submit" [disabled]="loading || chatForm.invalid" aria-label="Enviar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </form>
  </ng-container>

  <ng-template #instructorPanel>

    <!-- Estado de éxito: ticket enviado -->
    <div class="instructor-success" *ngIf="success; else instructorFormTpl">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
        <polyline points="22 4 12 14.01 9 11.01"/>
      </svg>
      <p>{{ success }}</p>
      <div class="instructor-success__actions">
        <button type="button" class="chat-submit chat-submit--outline" (click)="newTicket()">
          Enviar otro
        </button>
        <button type="button" class="chat-submit" (click)="selectMode('chatbot')">
          Volver al bot
        </button>
      </div>
    </div>

    <ng-template #instructorFormTpl>
      <form [formGroup]="instructorForm" (ngSubmit)="submitInstructor()" class="instructor-form">
        <label class="chat-field">
          <span>Asunto *</span>
          <input type="text" formControlName="subject" placeholder="Ej. Duda sobre rutina" />
        </label>
        <label class="chat-field">
          <span>Descripción *</span>
          <textarea formControlName="description" placeholder="Cuéntanos qué necesitas revisar con el instructor"></textarea>
        </label>
        <label class="chat-field">
          <span>Adjunto opcional</span>
          <input type="text" formControlName="attachment" placeholder="Nombre o referencia del archivo" />
        </label>

        <p class="chat-error" *ngIf="error">{{ error }}</p>

        <button class="chat-submit" type="submit" [disabled]="instructorForm.invalid || loading">
          {{ loading ? 'Enviando...' : 'Enviar a Instructor' }}
        </button>
      </form>
    </ng-template>

  </ng-template>

</aside>
